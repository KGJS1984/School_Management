<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fee Collection</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container mt-4">

<div class="card shadow">

<div class="card-header bg-success text-white">
<h3>💰 Fee Collection</h3>
</div>

<div class="card-body">

<form onsubmit="saveFee(); return false;">

<div class="row">

<div class="col-md-6 mb-3">
<label>Student Name</label>

  <input
type="text"
id="studentName"
class="form-control"
list="studentList"
onkeyup="loadStudentSuggestions()"
onchange="fillStudentInfo()"
autocomplete="off">

<datalist id="studentList"></datalist>
  
</div>

<div class="col-md-6 mb-3">
<label>Roll</label>
<input type="text" id="studentRoll" class="form-control" readonly>
</div>

<div class="col-md-6 mb-3">
<label>Month</label>
<input type="month" id="feeMonth" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>Amount (৳)</label>
<input type="number" id="feeAmount" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>Payment Method</label>
<select id="paymentMethod" class="form-select">
<option>Cash</option>
<option>bKash</option>
<option>Nagad</option>
<option>Bank</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label>Receipt No</label>
<input type="text" id="receiptNo" class="form-control">
</div>

<div class="col-12">

<button class="btn btn-success" type="submit">
💾 Collect Fee
</button>

<a href="dashboard.html" class="btn btn-secondary">
⬅ Dashboard
</a>

</div>

</div>

</form>

</div>

</div>

</div>

<script src="js/fees.js"></script>

</body>
</html>
