<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Result Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h3>📊 Result Management</h3>

</div>

<div class="card-body">

<form onsubmit="saveResult(); return false;">

<div class="row">

<div class="col-md-4 mb-3">
<label>Student Name</label>
<input type="text" id="resultName" class="form-control" required>
</div>

<div class="col-md-4 mb-3">
<label>Class</label>
<input type="text" id="resultClass" class="form-control" required>
</div>

<div class="col-md-4 mb-3">
<label>Roll</label>
<input type="number" id="resultRoll" class="form-control" required>
</div>

<div class="col-md-4 mb-3">
<label>Bangla</label>
<input type="number" id="bangla" class="form-control" required>
</div>

<div class="col-md-4 mb-3">
<label>English</label>
<input type="number" id="english" class="form-control" required>
</div>

<div class="col-md-4 mb-3">
<label>Math</label>
<input type="number" id="math" class="form-control" required>
</div>

<div class="col-12">

<button class="btn btn-success">
💾 Save Result
</button>

<a href="dashboard.html" class="btn btn-secondary">
🏠 Dashboard
</a>

</div>

</div>

</form>

</div>

</div>

</div>

<script src="js/results.js"></script>

</body>
</html>
<div class="container mt-4">

<h2>📊 Result List</h2>

<input
type="text"
id="searchResult"
class="form-control mb-3"
placeholder="🔍 Search Student..."
onkeyup="loadResults()">

<div class="table-responsive">

<table class="table table-bordered table-striped">

<thead class="table-success">

<tr>

<th>#</th>
<th>Name</th>
<th>Class</th>
<th>Roll</th>
<th>Subject</th>
<th>Marks</th>
<th>Grade</th>
<th>Action</th>

</tr>

</thead>

<tbody id="resultTable">

</tbody>

</table>

</div>

<a href="dashboard.html" class="btn btn-secondary">
🏠 Dashboard
</a>

</div>

<script src="js/results.js"></script>

<script>
loadResults();
</script>
