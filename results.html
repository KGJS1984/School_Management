<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Result Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">

<div class="card shadow">

<div class="card-header bg-primary text-white">
<h3>📊 Result Management</h3>
</div>

<div class="card-body">

<div class="row">

<div class="col-md-4 mb-3">
<label>Student ID</label>
<input type="text" class="form-control">
</div>

<div class="col-md-4 mb-3">
<label>Student Name</label>
<input type="text" class="form-control">
</div>

<div class="col-md-4 mb-3">
<label>Class</label>
<select class="form-select">
<option>Play</option>
<option>Nursery</option>
<option>KG</option>
<option>Class One</option>
<option>Class Two</option>
<option>Class Three</option>
<option>Class Four</option>
<option>Class Five</option>
</select>
</div>

<div class="col-md-4 mb-3">
<label>English</label>
<input type="number" class="form-control">
</div>

<div class="col-md-4 mb-3">
<label>Mathematics</label>
<input type="number" class="form-control">
</div>

<div class="col-md-4 mb-3">
<label>Science</label>
<input type="number" class="form-control">
</div>

<div class="col-md-4 mb-3">
<label>Bangla</label>
<input type="number" class="form-control">
</div>

<div class="col-md-4 mb-3">
<label>Religion</label>
<input type="number" class="form-control">
</div>

<div class="col-md-4 mb-3">
<label>ICT</label>
<input type="number" class="form-control">
</div>

</div>

<button class="btn btn-success">💾 Save Result</button>
<button class="btn btn-primary">🖨 Print Marksheet</button>

</div>

</div>

</div>

</body>
</html>
