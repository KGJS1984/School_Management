<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Routine Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container mt-4">

<h2 class="text-center mb-4">

📅 Routine Management

</h2>

<form onsubmit="saveRoutine(); return false;">

<div class="row">

<div class="col-md-4 mb-3">

<label>Class</label>

<input
type="text"
id="routineClass"
class="form-control"
required>

</div>

<div class="col-md-4 mb-3">

<label>Day</label>

<select
id="routineDay"
class="form-select">

<option>Saturday</option>

<option>Sunday</option>

<option>Monday</option>

<option>Tuesday</option>

<option>Wednesday</option>

<option>Thursday</option>

</select>

</div>

<div class="col-md-4 mb-3">

<label>Subject</label>

<input
type="text"
id="routineSubject"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Teacher</label>

<input
type="text"
id="routineTeacher"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Time</label>

<input
type="text"
id="routineTime"
class="form-control"
placeholder="09:00 AM - 09:45 AM"
required>

</div>

</div>

<button
class="btn btn-primary">

Save Routine

</button>

<a
href="routine_list.html"
class="btn btn-success">

Routine List

</a>

</form>

</div>

<script src="js/routine.js"></script>

</body>

</html>
