<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Certificate Generator</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container mt-4">

<h2 class="text-center">
📄 Certificate Generator
</h2>

<form onsubmit="saveCertificate();return false;">

<div class="mb-3">
<label>Student Name</label>
<input type="text"
id="studentName"
class="form-control"
required>
</div>

<div class="mb-3">
<label>Class</label>
<input type="text"
id="studentClass"
class="form-control"
required>
</div>

<div class="mb-3">
<label>Roll</label>
<input type="text"
id="studentRoll"
class="form-control"
required>
</div>

<div class="mb-3">
<label>Certificate Type</label>

<select
id="certificateType"
class="form-select">

<option>Character Certificate</option>

<option>Testimonial</option>

<option>Transfer Certificate</option>

</select>

</div>

<div class="mb-3">
<label>Issue Date</label>

<input
type="date"
id="issueDate"
class="form-control"
required>

</div>

<div class="mb-3">
<label>Remarks</label>

<textarea
id="remarks"
class="form-control"></textarea>

</div>

<button class="btn btn-success">

Save Certificate

</button>

<a href="certificate_list.html"
class="btn btn-primary">

View Certificates

</a>

</form>

</div>

<script src="js/certificate.js"></script>

</body>
</html>
