<!DOCTYPE html>
<html lang="en">
<head>

<title>Teacher ID Card</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f2f2f2;
}

.id-card{

width:350px;
margin:30px auto;
border:3px solid #198754;
border-radius:15px;
overflow:hidden;
box-shadow:0 0 15px gray;
background:white;

}

.header{

background:#198754;
color:white;
text-align:center;
padding:10px;

}

.photo{

text-align:center;
margin:15px;

}

.photo img{

width:110px;
height:110px;
border-radius:50%;
border:4px solid #198754;
object-fit:cover;

}

.body{

padding:15px;
font-size:16px;

}

.footer{

background:#f5f5f5;
text-align:center;
padding:10px;
font-weight:bold;

}

@media print{

button,a{
display:none;
}

body{
background:white;
}

.id-card{
box-shadow:none;
margin:auto;
}

}

</style>

</head>
