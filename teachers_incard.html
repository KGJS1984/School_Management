<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher ID Card</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f2f2f2;
    font-family:Arial,sans-serif;
}

.id-card{
    width:340px;
    margin:30px auto;
    background:#fff;
    border:3px solid #198754;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 15px rgba(0,0,0,.3);
}

.header{
    background:#198754;
    color:#fff;
    text-align:center;
    padding:15px;
}

.header img{
    width:60px;
    height:60px;
}

.photo{
    text-align:center;
    margin:15px 0;
}

.photo img{
    width:110px;
    height:110px;
    border-radius:50%;
    border:4px solid #198754;
    object-fit:cover;
}

.body{
    padding:15px;
}

.body p{
    margin:8px 0;
    font-size:16px;
}

.footer{
    background:#f5f5f5;
    text-align:center;
    padding:10px;
    font-weight:bold;
}

.buttons{
    text-align:center;
    margin:20px;
}

@media print{

.buttons{
display:none;
}

body{
background:white;
}

.id-card{
box-shadow:none;
margin:auto;
}

}

</style>

</head>

<body>

<div class="id-card">

<div class="header">

<img src="images/logo.png" alt="School Logo">

<h4>Gobindaganj KG & Junior School</h4>

<small>Teacher Identity Card</small>

</div>

<div class="photo">

<img id="teacherPhoto"
src="https://via.placeholder.com/110">

</div>

<div class="body">

<p><b>Name:</b> <span id="teacherName"></span></p>

<p><b>Designation:</b> <span id="teacherDesignation"></span></p>

<p><b>Mobile:</b> <span id="teacherMobile"></span></p>

<p><b>Email:</b> <span id="teacherEmail"></span></p>

<p><b>Teacher ID:</b> <span id="teacherID"></span></p>

</div>

<div class="footer">

Session : 2026

</div>

</div>

<div class="buttons">

<button class="btn btn-success"
onclick="window.print()">

🖨 Print ID Card

</button>

<a href="teachers_list.html"
class="btn btn-secondary">

⬅ Back

</a>

</div>

<script>

let index = localStorage.getItem("teacherProfileIndex");

let teachers = JSON.parse(localStorage.getItem("teachers")) || [];

if(index !== null){

let t = teachers[index];

if(t){

document.getElementById("teacherName").textContent = t.name || "";
document.getElementById("teacherDesignation").textContent = t.designation || "";
document.getElementById("teacherMobile").textContent = t.mobile || "";
document.getElementById("teacherEmail").textContent = t.email || "";
document.getElementById("teacherID").textContent = "TCH-" + (1001 + Number(index));

if(t.photo){
document.getElementById("teacherPhoto").src = t.photo;
}

}

}

</script>

</body>
</html>
