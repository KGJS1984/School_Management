<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher ID Card</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f0f2f5;
}

.id-card{

    width:360px;

    margin:30px auto;

    border:3px solid #198754;

    border-radius:15px;

    overflow:hidden;

    background:#fff;

    box-shadow:0 0 15px rgba(0,0,0,.2);

}

.id-header{

    background:#198754;

    color:#fff;

    text-align:center;

    padding:15px;

}

.school-logo{

    width:70px;

    height:70px;

    border-radius:50%;

    background:#fff;

    object-fit:cover;

}

.teacher-photo{

    width:120px;

    height:120px;

    border-radius:50%;

    border:4px solid #198754;

    object-fit:cover;

    margin-top:15px;

}

.info{

    padding:20px;

}

.info p{

    margin-bottom:8px;

    font-size:15px;

}

.footer{

    background:#198754;

    color:#fff;

    text-align:center;

    padding:10px;

    font-size:14px;

}

</style>

</head>

<body>

<div class="id-card">

<div class="id-header">

<img
src="images/logo.png"
class="school-logo"
onerror="this.style.display='none'">

<h4 class="mt-2">

Gobindaganj KG & Junior School

</h4>

<small>Teacher Identity Card</small>

</div>

<div class="text-center">

<img
id="cardPhoto"
src="https://via.placeholder.com/120"
class="teacher-photo">

<h4 class="mt-3" id="cardName">

Teacher Name

</h4>

<p id="cardDesignation">

Designation

</p>

</div>

<div class="info">

<p><strong>ID :</strong> <span id="cardID">-</span></p>

<p><strong>Mobile :</strong> <span id="cardMobile">-</span></p>

<p><strong>Email :</strong> <span id="cardEmail">-</span></p>

<p><strong>Blood :</strong> <span id="cardBlood">-</span></p>

<p><strong>Status :</strong> <span id="cardStatus">Active</span></p>

    <p><strong>Gender :</strong> <span id="cardGender">-</span></p>

<p><strong>Joining :</strong> <span id="cardJoining">-</span></p>

<p><strong>Address :</strong> <span id="cardAddress">-</span></p>

</div>

<div class="text-center mb-4">

<button
class="btn btn-success"
onclick="window.print()">

🖨 Print ID Card

</button>

<a
href="teachers_list.html"
class="btn btn-primary">

⬅ Back

</a>

</div>

<div class="footer">

<b>Gobindaganj KG & Junior School</b><br>

Teacher Identity Card

</div>

</div>

<script src="js/teachers.js"></script>

<script>

document.addEventListener("DOMContentLoaded",function(){

let index = localStorage.getItem("teacherProfileIndex");

if(index===null) return;

let teachers = JSON.parse(localStorage.getItem("teachers")) || [];

let t = teachers[index];

if(!t) return;

document.getElementById("cardPhoto").src =
t.photo || "https://via.placeholder.com/120";

document.getElementById("cardName").textContent =
t.name || "-";

document.getElementById("cardDesignation").textContent =
t.designation || "-";

document.getElementById("cardID").textContent =
t.id || "-";

document.getElementById("cardMobile").textContent =
t.mobile || "-";

document.getElementById("cardEmail").textContent =
t.email || "-";

document.getElementById("cardBlood").textContent =
t.blood || "-";

document.getElementById("cardGender").textContent =
t.gender || "-";

document.getElementById("cardJoining").textContent =
t.joining || "-";

document.getElementById("cardAddress").textContent =
t.address || "-";

document.getElementById("cardStatus").textContent =
t.status || "Active";

});

</script>

</body>

</html>
