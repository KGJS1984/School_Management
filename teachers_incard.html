<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher ID Card</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f2f2f2;
}

.id-card{
    width:350px;
    margin:30px auto;
    background:#fff;
    border:3px solid #198754;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 15px rgba(0,0,0,.3);
}

.header{
    background:#198754;
    color:#fff;
    text-align:center;
    padding:15px;
}

.header img{
    width:60px;
    height:60px;
}

.photo{
    text-align:center;
    margin-top:15px;
}

.photo img{
    width:110px;
    height:110px;
    border-radius:50%;
    border:4px solid #198754;
    object-fit:cover;
}

.body{
    padding:15px;
    font-size:16px;
}

.body p{
    margin:8px 0;
}

.footer{
    background:#f5f5f5;
    text-align:center;
    padding:10px;
    font-weight:bold;
}

.buttons{
    text-align:center;
    margin-top:20px;
}

@media print{

body{
background:white;
}

.buttons{
display:none;
}

.id-card{
box-shadow:none;
margin:auto;
}

}

</style>

</head>

<body>

<div class="id-card">

<div class="header">

<img src="images/logo.png" alt="Logo">

<h4>Gobindaganj KG & Junior School</h4>

<small>Teacher Identity Card</small>

</div>

<div class="photo">

<img id="teacherPhoto"
src="https://via.placeholder.com/110">

</div>

<div class="body">

<p><b>Name :</b> <span id="teacherName"></span></p>

<p><b>Designation :</b> <span id="teacherDesignation"></
