<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teachers List | School Management System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

<style>

body{
    background:#f5f7fb;
}

.card{
    border:none;
    border-radius:15px;
}

.table img{
    width:45px;
    height:45px;
    border-radius:50%;
    object-fit:cover;
}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success shadow">

<div class="container">

<a class="navbar-brand fw-bold" href="dashboard.html">

🏫 School Management System

</a>

<div>

<a href="teachers.html" class="btn btn-light btn-sm">

➕ Add Teacher

</a>

<a href="dashboard.html" class="btn btn-warning btn-sm">

🏠 Dashboard

</a>

</div>

</div>

</nav>

<div class="container py-4">

<div class="card shadow">

<div class="card-header bg-success text-white d-flex justify-content-between align-items-center">

<h4 class="mb-0">

👨‍🏫 Teachers List

</h4>

<span class="badge bg-light text-dark">

Total :
<span id="teacherCount">0</span>

</span>

</div>

<div class="card-body">

<div class="row mb-3">

<div class="col-md-6">

<input
type="text"
id="searchTeacher"
class="form-control"
placeholder="🔍 Search Teacher..."
list="teacherSuggestion"
onkeyup="loadTeachers();loadTeacherSuggestions();">

<datalist id="teacherSuggestion"></datalist>

</div>

<div class="col-md-6 text-end">

<button
class="btn btn-success"
onclick="exportTeachers()">

Export

</button>

<button
class="btn btn-danger"
onclick="clearTeachers()">

Clear All

</button>

</div>

</div>

<div class="table-responsive">

<table class="table table-bordered table-hover align-middle">

<thead class="table-success">

<tr>

<th>#</th>

<th>Teacher</th>

<th>Designation</th>

<th>Mobile</th>

<th>Email</th>

<th width="180">Action</th>

</tr>

</thead>

<tbody id="teacherTable">

</tbody>

</table>

</div>

          </div>

    </div>

</div>

<footer class="text-center text-muted py-3">

    <small>

        © 2026 School Management System | Teacher Module

    </small>

</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Teachers JS -->
<script src="js/teachers.js"></script>

<script>

// Auto Load
document.addEventListener("DOMContentLoaded", function () {

    if (typeof loadTeachers === "function") {
        loadTeachers();
    }

    if (typeof updateTeacherCount === "function") {
        updateTeacherCount();
    }

    if (typeof loadTeacherSuggestions === "function") {
        loadTeacherSuggestions();
    }

});

</script>

</body>

</html>
