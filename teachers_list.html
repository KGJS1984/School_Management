<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher List</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2>👨‍🏫 Teacher List</h2>

<input
type="text"
id="searchTeacher"
class="form-control mb-3"
placeholder="🔍 Search Teacher..."
list="teacherSuggestion"
onkeyup="loadTeachers();loadTeacherSuggestions()"
autocomplete="off">

<datalist id="teacherSuggestion"></datalist>

<div class="table-responsive">

<table class="table table-bordered table-striped">

<thead class="table-success">

<tr>

<th>#</th>
<th>Name</th>
<th>Designation</th>
<th>Mobile</th>
<th>Email</th>
<th>Action</th>

</tr>

</thead>

<tbody id="teacherTable">

</tbody>

</table>

</div>

<a href="teachers.html" class="btn btn-success">
➕ Add Teacher
</a>

<a href="dashboard.html" class="btn btn-secondary">
🏠 Dashboard
</a>

</div>

<script src="js/teachers.js"></script>

<script>
console.log(JSON.parse(localStorage.getItem("teachers")));
loadTeachers();
</script>

</body>
</html>
