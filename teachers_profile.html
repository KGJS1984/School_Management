<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher Profile | School Management System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

<style>

body{
    background:#f5f7fb;
}

.profile-card{
    max-width:900px;
    margin:auto;
    border-radius:15px;
}

.profile-photo{

    width:180px;
    height:180px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid #198754;

}

.info-title{

    font-weight:bold;
    color:#198754;

}

</style>

</head>

<body>

<nav class="navbar navbar-dark bg-success">

<div class="container">

<a class="navbar-brand fw-bold"
href="dashboard.html">

🏫 School Management System

</a>

<div>

<a href="teachers_list.html"
class="btn btn-light btn-sm">

⬅ Teacher List

</a>

</div>

</div>

</nav>

<div class="container py-4">

<div class="card shadow profile-card">

<div class="card-header bg-success text-white">

<h3 class="mb-0">

👨‍🏫 Teacher Profile

</h3>

</div>

<div class="card-body">

<div class="row">

<div class="col-md-4 text-center">

<img
id="profilePhoto"
src="https://via.placeholder.com/180"
class="profile-photo">

<h4
class="mt-3"
id="profileName">

Teacher Name

</h4>

<p
class="text-muted"
id="profileDesignation">

Designation

</p>

</div>

<div class="col-md-8">

<div class="row">

<div class="col-md-6 mb-3">

<div class="info-title">
Teacher ID
</div>

<div id="profileID">
-
</div>

</div>

<div class="col-md-6 mb-3">

<div class="info-title">
Mobile
</div>

<div id="profileMobile">
-
</div>

</div>

<div class="col-md-6 mb-3">

<div class="info-title">
Email
</div>

<div id="profileEmail">
-
</div>

</div>

<div class="col-md-6 mb-3">

<div class="info-title">
Gender
</div>

<div id="profileGender">
-
</div>

</div>

  <div class="col-md-6 mb-3">

<div class="info-title">
Blood Group
</div>

<div id="profileBlood">-</div>

</div>

<div class="col-md-6 mb-3">

<div class="info-title">
Date of Birth
</div>

<div id="profileDOB">-</div>

</div>

<div class="col-md-6 mb-3">

<div class="info-title">
Joining Date
</div>

<div id="profileJoining">-</div>

</div>

<div class="col-md-6 mb-3">

<div class="info-title">
Qualification
</div>

<div id="profileQualification">-</div>

</div>

<div class="col-md-6 mb-3">

<div class="info-title">
Monthly Salary
</div>

<div id="profileSalary">-</div>

</div>

<div class="col-md-6 mb-3">

<div class="info-title">
Status
</div>

<div id="profileStatus">
<span class="badge bg-success">Active</span>
</div>

</div>

<div class="col-12 mb-3">

<div class="info-title">
Address
</div>

<div id="profileAddress">-</div>

</div>

<div class="col-12 mt-4">

<button
class="btn btn-success"
onclick="window.print()">

🖨 Print Profile

</button>

<a
href="teachers_list.html"
class="btn btn-primary">

⬅ Back to Teacher List

</a>

</div>

</div>

</div>

</div>

</div>

</div>

<script src="js/teachers.js"></script>

<script>

document.addEventListener("DOMContentLoaded",function(){

let index=localStorage.getItem("teacherProfileIndex");

if(index===null) return;

let teachers=JSON.parse(localStorage.getItem("teachers"))||[];

let t=teachers[index];

if(!t) return;

document.getElementById("profilePhoto").src=t.photo||"https://via.placeholder.com/180";

document.getElementById("profileName").textContent=t.name||"-";

document.getElementById("profileDesignation").textContent=t.designation||"-";

document.getElementById("profileID").textContent=t.id||"-";

document.getElementById("profileMobile").textContent=t.mobile||"-";

document.getElementById("profileEmail").textContent=t.email||"-";

document.getElementById("profileGender").textContent=t.gender||"-";

document.getElementById("profileBlood").textContent=t.blood||"-";

document.getElementById("profileDOB").textContent=t.dob||"-";

document.getElementById("profileJoining").textContent=t.joining||"-";

document.getElementById("profileQualification").textContent=t.qualification||"-";

document.getElementById("profileSalary").textContent=t.salary||"-";

document.getElementById("profileAddress").textContent=t.address||"-";

document.getElementById("profileStatus").innerHTML=
t.status==="Inactive"
?'<span class="badge bg-danger">Inactive</span>'
:'<span class="badge bg-success">Active</span>';

});

</script>

</body>

  </html>
