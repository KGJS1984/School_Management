<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

<div class="card shadow">

<div class="card-header bg-primary text-white">
<h3>👨‍🏫 Teacher Profile</h3>
</div>

<div class="card-body">

<h2 id="tName"></h2>

<table class="table table-bordered">

<tr>
<th>Designation</th>
<td id="tDesignation"></td>
</tr>

<tr>
<th>Mobile</th>
<td id="tMobile"></td>
</tr>

<tr>
<th>Email</th>
<td id="tEmail"></td>
</tr>

</table>

<a href="teachers_list.html" class="btn btn-secondary">
⬅ Back
</a>

</div>

</div>

</div>

<script>

let index = localStorage.getItem("teacherProfileIndex");

let teachers =
JSON.parse(localStorage.getItem("teachers")) || [];

let t = teachers[index];

if(t){

document.getElementById("tName").innerHTML = t.name;
document.getElementById("tDesignation").innerHTML = t.designation;
document.getElementById("tMobile").innerHTML = t.mobile;
document.getElementById("tEmail").innerHTML = t.email;

}

</script>

</body>
</html>
