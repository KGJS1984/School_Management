<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student ID Card</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

.id-card{

width:340px;

margin:30px auto;

border:3px solid #0d6efd;

border-radius:15px;

overflow:hidden;

box-shadow:0 0 15px gray;

}

.header{

background:#0d6efd;

color:white;

text-align:center;

padding:10px;

}

.photo{

text-align:center;

margin-top:15px;

}

.photo img{

width:110px;

height:110px;

border-radius:50%;

border:4px solid #0d6efd;

}

.body{

padding:15px;

font-size:16px;

}

.footer{

background:#f5f5f5;

text-align:center;

padding:10px;

font-weight:bold;

}

</style>

</head>

<body>

<div class="id-card">

<div class="header">

<h4>Gobindaganj KG & Junior School</h4>

<small>Student Identity Card</small>

</div>

<div class="photo">

<img id="idPhoto"
src="https://via.placeholder.com/110">

</div>

<div class="body">

<p><b>Name:</b> <span id="idName"></span></p>

<p><b>Class:</b> <span id="idClass"></span></p>

<p><b>Roll:</b> <span id="idRoll"></span></p>

<p><b>Father:</b> <span id="idFather"></span></p>

<p><b>Mobile:</b> <span id="idMobile"></span></p>

</div>

<div class="footer">

Session : 2026

</div>

</div>

<div class="text-center">

<button onclick="window.print()"
class="btn btn-success">

🖨 Print ID Card

</button>

<a href="students.html"
class="btn btn-secondary">

⬅ Back

</a>

</div>

<script>

let index = localStorage.getItem("profileIndex");

let students =
JSON.parse(localStorage.getItem("students")) || [];

let s = students[index];

if(s){

document.getElementById("idName").innerHTML=s.name;
document.getElementById("idClass").innerHTML=s.class;
document.getElementById("idRoll").innerHTML=s.roll;
document.getElementById("idFather").innerHTML=s.father;
document.getElementById("idMobile").innerHTML=s.mobile;

if(s.photo){

document.getElementById("idPhoto").src=s.photo;

}

}

</script>

</body>
</html>
