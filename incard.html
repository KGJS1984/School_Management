<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student ID Card</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f5f5f5;
}
.id-card{
    width:350px;
    margin:40px auto;
    border:2px solid #0d6efd;
    border-radius:15px;
    background:#fff;
    padding:20px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,.2);
}
.id-card img{
    width:120px;
    height:120px;
    border-radius:50%;
    border:3px solid #0d6efd;
}
</style>

</head>
<body>

<div class="id-card">

<h4>🎓 Gobindaganj KG & Junior School</h4>
<hr>

<img id="studentPhoto" src="https://via.placeholder.com/120">

<h5 id="studentName">Student Name</h5>

<p><b>ID:</b> <span id="studentId">STD0001</span></p>

<p><b>Class:</b> <span id="studentClass">Class Five</span></p>

<p><b>Roll:</b> <span id="studentRoll">01</span></p>

<hr>

<p style="font-size:12px;">
This card is the property of Gobindaganj KG & Junior School.
</p>

<button class="btn btn-primary" onclick="window.print()">
🖨 Print ID Card
</button>

</div>

</body>
</html>
