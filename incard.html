<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student ID Card</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

<style>
.id-card{
    width:350px;
    margin:30px auto;
    border:3px solid #0d6efd;
    border-radius:15px;
    text-align:center;
    padding:20px;
    box-shadow:0 0 15px rgba(0,0,0,.2);
}
.id-card img{
    border-radius:50%;
    border:3px solid #0d6efd;
}
</style>

</head>
<body>

<div class="id-card">

<h4>Gobindaganj KG & Junior School</h4>
<p>Student Identity Card</p>

<img id="idPhoto"
src="https://via.placeholder.com/120"
width="120"
height="120">

<hr>

<h4 id="idName"></h4>

<p><strong>Class:</strong> <span id="idClass"></span></p>

<p><strong>Roll:</strong> <span id="idRoll"></span></p>

<p><strong>Student ID:</strong> <span id="studentId"></span></p>

<button class="btn btn-primary" onclick="window.print()">
🖨 Print ID Card
</button>

<br><br>

<a href="students.html" class="btn btn-secondary">
⬅ Back
</a>

</div>

<script src="js/idcard.js"></script>

</body>
</html>
