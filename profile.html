<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container mt-4">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h3>👨‍🎓 Student Profile</h3>

</div>

<div class="card-body text-center">

<img id="profilePhoto"
src="https://via.placeholder.com/150"
class="rounded-circle mb-3"
width="150"
height="150">

<h3 id="pname">Student Name</h3>

<hr>

<table class="table table-bordered">

<tr>
<th>Father</th>
<td id="pfather"></td>
</tr>

<tr>
<th>Mother</th>
<td id="pmother"></td>
</tr>

<tr>
<th>Class</th>
<td id="pclass"></td>
</tr>

<tr>
<th>Roll</th>
<td id="proll"></td>
</tr>

<tr>
<th>Mobile</th>
<td id="pmobile"></td>
</tr>

<tr>
<th>Address</th>
<td id="paddress"></td>
</tr>

</table>

<a href="students.html"
class="btn btn-secondary">

⬅ Back

</a>

</div>

</div>

</div>

<script src="js/profile.js"></script>

<script>

window.addEventListener("load", function(){

    let profileIndex =
    localStorage.getItem("profileIndex");

    if(profileIndex === null) return;

    let students =
    JSON.parse(localStorage.getItem("students")) || [];

    let s = students[profileIndex];

    document.getElementById("pname").innerHTML =
    s.name;

    document.getElementById("pfather").innerHTML =
    s.father;

    document.getElementById("pmother").innerHTML =
    s.mother;

    document.getElementById("pclass").innerHTML =
    s.class;

    document.getElementById("proll").innerHTML =
    s.roll;

    document.getElementById("pmobile").innerHTML =
    s.mobile;

    document.getElementById("paddress").innerHTML =
    s.address;

});

</script>
</body>

</html>
