<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Profile</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container mt-4">

<div class="card shadow">

<div class="card-header bg-primary text-white">
<h3>👤 Student Profile</h3>
</div>

<div class="card-body text-center">

<img id="profilePhoto"
src="https://via.placeholder.com/150"
class="rounded-circle mb-3"
width="150">

<h3 id="pName"></h3>

<table class="table table-bordered">

<tr><th>Father</th><td id="pFather"></td></tr>
<tr><th>Mother</th><td id="pMother"></td></tr>
<tr><th>Class</th><td id="pClass"></td></tr>
<tr><th>Roll</th><td id="pRoll"></td></tr>
<tr><th>Mobile</th><td id="pMobile"></td></tr>
<tr><th>Address</th><td id="pAddress"></td></tr>

</table>

<a href="students.html" class="btn btn-secondary">
⬅ Back
</a>

<a href="idcard.html" class="btn btn-success">
🪪 View ID Card
</a>

</div>

</div>

</div>

<script src="js/profile.js"></script>

</body>
</html>
