<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Class Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<div class="card shadow">

<div class="card-header bg-primary text-white">

<h3>🏫 Class Management</h3>

</div>

<div class="card-body">

<form onsubmit="saveClass();return false;">

<div class="row">

<div class="col-md-6 mb-3">

<label>Class Name</label>

<input
type="text"
id="className"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Section</label>

<input
type="text"
id="section"
class="form-control"
required>

</div>

<div class="col-md-6 mb-3">

<label>Class Teacher</label>

<input
type="text"
id="classTeacher"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>Room No</label>

<input
type="text"
id="roomNo"
class="form-control">

</div>

<div class="col-md-6 mb-3">

<label>Capacity</label>

<input
type="number"
id="capacity"
class="form-control">

</div>

</div>

<button
class="btn btn-success">

💾 Save Class

</button>

<a
href="classes_list.html"
class="btn btn-primary">

📋 Class List

</a>

<a
href="dashboard.html"
class="btn btn-secondary">

🏠 Dashboard

</a>

</form>

</div>

</div>

</div>

<script src="js/classes.js"></script>

</body>

</html>
