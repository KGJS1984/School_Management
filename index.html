<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gobindaganj KG & Junior School | Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="bg-light">

<div class="container">
    <div class="row justify-content-center align-items-center vh-100">

        <div class="col-lg-4 col-md-5">

            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-header bg-primary text-white text-center py-3">
                    <h3>🎓 Gobindaganj KG & Junior School</h3>
                    <p class="mb-0">School Management System v2.0</p>
                </div>

                <div class="card-body p-4">

                    <div class="text-center mb-4">
                        <img src="images/logo.png"
                             alt="School Logo"
                             width="100"
                             onerror="this.style.display='none'">
                    </div>

                    <form onsubmit="login(); return false;">

                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input
                                type="email"
                                id="email"
                                class="form-control"
                                placeholder="admin@gmail.com"
                                required>
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>

                            <div class="input-group">
                                <input
                                    type="password"
                                    id="password"
                                    class="form-control"
                                    placeholder="********"
                                    required>

                                <button
                                    type="button"
                                    class="btn btn-outline-secondary"
                                    onclick="togglePassword()">
                                    👁
                                </button>
                            </div>
                        </div>

                        <button
                            type="submit"
                            class="btn btn-primary w-100">
                            Login
                        </button>

                    </form>

                </div>

                <div class="card-footer text-center">

                    <small>
                        <b>Default Login</b><br>
                        Email: <b>admin@gmail.com</b><br>
                        Password: <b>123456</b>
                    </small>

                    <hr>

                    <small>
                        © <span id="year"></span> Gobindaganj KG & Junior School
                    </small>

                </div>

            </div>

        </div>

    </div>
</div>

<script src="js/app.js"></script>

<script>
document.getElementById("year").textContent = new Date().getFullYear();

function togglePassword() {
    const password = document.getElementById("password");
    password.type = password.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
