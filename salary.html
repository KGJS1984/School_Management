<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Salary Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container mt-4">

<h2 class="text-center">
💵 Salary Management
</h2>

<form onsubmit="saveSalary(); return false;">

<div class="mb-3">
<label>Teacher Name</label>
<input type="text" id="teacherName" class="form-control" required>
</div>

<div class="mb-3">
<label>Designation</label>
<input type="text" id="designation" class="form-control" required>
</div>

<div class="mb-3">
<label>Month</label>
<input type="month" id="salaryMonth" class="form-control" required>
</div>

<div class="mb-3">
<label>Basic Salary</label>
<input type="number" id="basicSalary" class="form-control" required>
</div>

<div class="mb-3">
<label>Bonus</label>
<input type="number" id="bonus" class="form-control" value="0">
</div>

<div class="mb-3">
<label>Deduction</label>
<input type="number" id="deduction" class="form-control" value="0">
</div>

<button class="btn btn-success">
💾 Save Salary
</button>

<a href="salary_list.html" class="btn btn-primary">
📋 Salary History
</a>

</form>

</div>

<script src="js/salary.js"></script>

</body>
</html>
