<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Management</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

<div class="card shadow">

<div class="card-header bg-success text-white">
<h3>👨‍🏫 Teacher Management</h3>
</div>

<div class="card-body">

<form onsubmit="saveTeacher(); return false;">

<div class="row">

<div class="col-md-6 mb-3">
<label>Teacher Name</label>
<input type="text" id="teacherName" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>Designation</label>
<input type="text" id="designation" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>Mobile</label>
<input type="text" id="teacherMobile" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Email</label>
<input type="email" id="teacherEmail" class="form-control">
</div>

<div class="col-12">
<button class="btn btn-success" type="submit">
💾 Save Teacher
</button>

<a href="dashboard.html" class="btn btn-secondary">
🏠 Dashboard
</a>
</div>

</div>

</form>

</div>

</div>

</div>

<script src="js/teachers.js"></script>

</body>
</html>
