<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher Management | School Management System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

<style>

body{
    background:#f5f7fb;
}

.card{
    border:none;
    border-radius:15px;
}

.card-header{
    border-radius:15px 15px 0 0 !important;
}

.required{
    color:red;
}

.photo-box{

    width:150px;
    height:150px;
    border:3px solid #198754;
    border-radius:50%;
    overflow:hidden;
    margin:auto;

}

.photo-box img{

    width:100%;
    height:100%;
    object-fit:cover;

}

</style>

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-success shadow">

<div class="container">

<a class="navbar-brand fw-bold" href="dashboard.html">

🏫 School Management System

</a>

<div>

<a href="dashboard.html" class="btn btn-light btn-sm">

🏠 Dashboard

</a>

<a href="teachers_list.html" class="btn btn-warning btn-sm">

👨‍🏫 Teacher List

</a>

</div>

</div>

</nav>

<div class="container py-4">

<div class="card shadow-lg">

<div class="card-header bg-success text-white">

<h3 class="mb-0">

👨‍🏫 Teacher Management

</h3>

<p class="mb-0">

Add / Edit Teacher Information

</p>

</div>

<div class="card-body">

<form id="teacherForm"
onsubmit="saveTeacher();return false;">

<div class="row">
<!-- Teacher Name -->
<div class="col-md-6 mb-3">
    <label class="form-label">
        Teacher Name <span class="required">*</span>
    </label>

    <input type="text"
           id="teacherName"
           class="form-control"
           placeholder="Enter Teacher Name"
           required>
</div>

<!-- Designation -->
<div class="col-md-6 mb-3">
    <label class="form-label">
        Designation <span class="required">*</span>
    </label>

    <input type="text"
           id="designation"
           class="form-control"
           placeholder="Assistant Teacher / Head Teacher"
           required>
</div>

<!-- Mobile -->
<div class="col-md-6 mb-3">
    <label class="form-label">Mobile Number</label>

    <input type="text"
           id="teacherMobile"
           class="form-control"
           placeholder="01XXXXXXXXX">
</div>

<!-- Email -->
<div class="col-md-6 mb-3">
    <label class="form-label">Email Address</label>

    <input type="email"
           id="teacherEmail"
           class="form-control"
           placeholder="teacher@gmail.com">
</div>

<!-- Gender -->
<div class="col-md-6 mb-3">
    <label class="form-label">Gender</label>

    <select id="teacherGender"
            class="form-select">

        <option value="">Select Gender</option>

        <option>Male</option>

        <option>Female</option>

        <option>Other</option>

    </select>
</div>

<!-- Blood Group -->
<div class="col-md-6 mb-3">
    <label class="form-label">Blood Group</label>

    <select id="teacherBlood"
            class="form-select">

        <option value="">Select Blood Group</option>

        <option>A+</option>
        <option>A-</option>
        <option>B+</option>
        <option>B-</option>
        <option>AB+</option>
        <option>AB-</option>
        <option>O+</option>
        <option>O-</option>

    </select>
</div>

<!-- Date of Birth -->
<div class="col-md-6 mb-3">
    <label class="form-label">Date of Birth</label>

    <input type="date"
           id="teacherDOB"
           class="form-control">
</div>

<!-- Joining Date -->
<div class="col-md-6 mb-3">
    <label class="form-label">Joining Date</label>

    <input type="date"
           id="teacherJoinDate"
           class="form-control">
</div>

<!-- Qualification -->
<div class="col-md-6 mb-3">
    <label class="form-label">Qualification</label>

    <input type="text"
           id="teacherQualification"
           class="form-control"
           placeholder="BA, MA, B.Ed">
</div>

<!-- Salary -->
<div class="col-md-6 mb-3">
    <label class="form-label">Monthly Salary</label>

    <input type="number"
           id="teacherSalary"
           class="form-control"
           placeholder="20000">
</div>

<!-- Address -->
<div class="col-md-12 mb-3">
    <label class="form-label">Address</label>

    <textarea id="teacherAddress"
              class="form-control"
              rows="3"
              placeholder="Teacher Address"></textarea>
        </div>
<!-- ========================= -->
<!-- Teacher Photo -->
<!-- ========================= -->

<div class="col-md-4 mb-4 text-center">

    <label class="form-label fw-bold">
        Teacher Photo
    </label>

    <div class="photo-box mb-3">

        <img id="teacherPhotoPreview"
             src="https://via.placeholder.com/150"
             alt="Teacher Photo">

    </div>

    <input type="file"
           id="teacherPhoto"
           class="form-control"
           accept="image/*"
           onchange="previewTeacherPhoto(event)">

</div>

<!-- ========================= -->
<!-- Teacher Status -->
<!-- ========================= -->

<div class="col-md-8">

<div class="row">

<div class="col-md-6 mb-3">

<label class="form-label">
Employment Status
</label>

<select id="teacherStatus"
class="form-select">

<option value="Active">🟢 Active</option>

<option value="Inactive">🔴 Inactive</option>

<option value="On Leave">🟡 On Leave</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label class="form-label">
Teacher ID
</label>

<input type="text"
id="teacherID"
class="form-control"
placeholder="Auto Generated"
readonly>

</div>

<div class="col-md-12 mb-3">

<div class="alert alert-success">

<b>Information:</b>

Teacher ID will be generated automatically after saving.

</div>

</div>

</div>

</div>

<!-- ========================= -->
<!-- Buttons -->
<!-- ========================= -->

<div class="col-12 mt-4">

<hr>

<div class="d-flex flex-wrap gap-2 justify-content-center">

<button
type="submit"
class="btn btn-success btn-lg">

💾 Save Teacher

</button>

<button
type="reset"
class="btn btn-warning btn-lg">

🔄 Reset

</button>

<a href="teachers_list.html"
class="btn btn-primary btn-lg">

👨‍🏫 Teacher List

</a>

<a href="dashboard.html"
class="btn btn-secondary btn-lg">

🏠 Dashboard

</a>

</div>

</div>
</div>

</form>

</div>

</div>

</div>

<script src="js/teachers.js"></script>

<script>

// Auto Teacher ID

document.addEventListener("DOMContentLoaded",function(){

let id=document.getElementById("teacherID");

if(id){

id.value="TCH-"+Date.now().toString().slice(-6);

}

});

</script>

</body>

</html>
