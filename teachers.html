<div class="container py-4">

<div class="card shadow-lg">

<div class="card-header bg-success text-white">

<h3 class="mb-0">

👨‍🏫 Teacher Management

</h3>

<p class="mb-0">

Add / Edit Teacher Information

</p>

</div>

<div class="card-body">

<form id="teacherForm"
onsubmit="saveTeacher();return false;">

<div class="row">
<!-- Teacher Name -->
<div class="col-md-6 mb-3">
    <label class="form-label">
        Teacher Name <span class="required">*</span>
    </label>

    <input type="text"
           id="teacherName"
           class="form-control"
           placeholder="Enter Teacher Name"
           required>
</div>

<!-- Designation -->
<div class="col-md-6 mb-3">
    <label class="form-label">
        Designation <span class="required">*</span>
    </label>

    <input type="text"
           id="designation"
           class="form-control"
           placeholder="Assistant Teacher / Head Teacher"
           required>
</div>

<!-- Mobile -->
<div class="col-md-6 mb-3">
    <label class="form-label">Mobile Number</label>

    <input type="text"
           id="teacherMobile"
           class="form-control"
           placeholder="01XXXXXXXXX">
</div>

<!-- Email -->
<div class="col-md-6 mb-3">
    <label class="form-label">Email Address</label>

    <input type="email"
           id="teacherEmail"
           class="form-control"
           placeholder="teacher@gmail.com">
</div>

<!-- Gender -->
<div class="col-md-6 mb-3">
    <label class="form-label">Gender</label>

    <select id="teacherGender"
            class="form-select">

        <option value="">Select Gender</option>

        <option>Male</option>

        <option>Female</option>

        <option>Other</option>

    </select>
</div>

<!-- Blood Group -->
<div class="col-md-6 mb-3">
    <label class="form-label">Blood Group</label>

    <select id="teacherBlood"
            class="form-select">

        <option value="">Select Blood Group</option>

        <option>A+</option>
        <option>A-</option>
        <option>B+</option>
        <option>B-</option>
        <option>AB+</option>
        <option>AB-</option>
        <option>O+</option>
        <option>O-</option>

    </select>
</div>

<!-- Date of Birth -->
<div class="col-md-6 mb-3">
    <label class="form-label">Date of Birth</label>

    <input type="date"
           id="teacherDOB"
           class="form-control">
</div>

<!-- Joining Date -->
<div class="col-md-6 mb-3">
    <label class="form-label">Joining Date</label>

    <input type="date"
           id="teacherJoinDate"
           class="form-control">
</div>

<!-- Qualification -->
<div class="col-md-6 mb-3">
    <label class="form-label">Qualification</label>

    <input type="text"
           id="teacherQualification"
           class="form-control"
           placeholder="BA, MA, B.Ed">
</div>

<!-- Salary -->
<div class="col-md-6 mb-3">
    <label class="form-label">Monthly Salary</label>

    <input type="number"
           id="teacherSalary"
           class="form-control"
           placeholder="20000">
</div>

<!-- Address -->
<div class="col-md-12 mb-3">
    <label class="form-label">Address</label>

    <textarea id="teacherAddress"
              class="form-control"
              rows="3"
              placeholder="Teacher Address"></textarea>
        </div>
