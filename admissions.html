<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Admission</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>
<body>

<div class="container mt-4">

<div class="card shadow">

<div class="card-header bg-primary text-white">
<h3>🎓 Student Admission Form</h3>
</div>

<div class="card-body"
<form id="studentForm" onsubmit="saveStudent(event)">

<div class="row">

<div class="col-md-6 mb-3">
<label>Student ID</label>
<input type="text" id="studentName" class="form-control" value="Auto Generate" readonly>
</div>

<div class="col-md-6 mb-3">
<label>Admission Date</label>
<input type="date" id="fatherName" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Student Name</label>
<input type="text" id="motherName" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Father's Name</label>
<input type="text" id=class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Mother's Name</label>
<input type="text" id="mobile" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Date of Birth</label>
<input type="date" id="address" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Gender</label>
<select class="form-select">
<option>Male</option>
<option>Female</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label>Class</label>
<select class="form-select">
<option>Play</option>
<option>Nursery</option>

<option>Class One</option>
<option>Class Two</option>
<option>Class Three</option>
<option>Class Four</option>
<option>Class Five</option>
</select>
</div>

<div class="col-md-6 mb-3">
<label>Roll</label>
<input type="number" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Mobile</label>
<input type="text" class="form-control">
</div>

<div class="col-12 mb-3">
<label>Address</label>
<textarea class="form-control" rows="3"></textarea>
</div>

<div class="col-12 mb-3">
<label>Student Photo</label>
<div class="col-md-6 mb-3">
    <label>Student Photo</label>
    <input type="file" id="photo" class="form-control" accept="image/*" onchange="previewPhoto(event)">
</div>

<div class="col-md-6 mb-3 text-center">
    <img id="photoPreview"
         src="https://via.placeholder.com/150"
         width="150"
         height="150"
         style="border:2px solid #ccc;border-radius:10px;">
</div>
<input type="file" class="form-control">
</div>

<div class="col-12">

<button type="submit" class="btn btn-success">
💾 Save Student
<button type="reset" class="btn btn-warning">
    ✨ New Entry
</button>

<button type="reset" class="btn btn-danger">
🔄 Reset
</button>

<a href="dashboard.html" class="btn btn-secondary">
⬅ Dashboard
</a>

</div>

</div>

</form>

</div>

</div>

</div>

<script src="js/students.js"></script>
</body>
</html>
