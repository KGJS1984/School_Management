<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Admission</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container mt-4">

<div class="card shadow">

<div class="card-header bg-primary text-white">
<h3>🎓 Student Admission Form</h3>
</div>

<div class="card-body">

<form id="studentForm" onsubmit="saveStudent(); return false;">

<div class="row">

<div class="col-md-6 mb-3">
<label>Student Name</label>
<input type="text" id="name" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>Father's Name</label>
<input type="text" id="father" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>Mother's Name</label>
<input type="text" id="mother" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>Date of Birth</label>
<input type="date" id="dob" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>Gender</label>

<select id="gender" class="form-select">
<option>Male</option>
<option>Female</option>
</select>

</div>
<div class="col-md-6 mb-3">
    <label>Class</label>

    <select id="class" class="form-select">
        <option>Play</option>
        <option>Nursery</option>
        <option>Std I</option>
        <option>Std II</option>
        <option>Std III</option>
        <option>Std IV</option>
        <option>Std V</option>
    </select>
</div>

<div class="col-md-6 mb-3">
    <label>Roll</label>
    <input type="number" id="roll" class="form-control" required>
            </div>


<div class="col-md-6 mb-3">
<label>Mobile</label>
<input type="text" id="mobile" class="form-control">
</div>

<div class="col-12 mb-3">
<label>Address</label>
<textarea id="address" class="form-control" rows="3"></textarea>
</div>

<div class="col-md-6 mb-3">
<label>Student Photo</label>
<input type="file"
       id="photo"
       class="form-control"
       accept="image/*"
       onchange="previewPhoto(event)">
</div>

<div class="col-md-6 mb-3 text-center">
<img id="photoPreview"
     src="https://via.placeholder.com/150"
     width="150"
     height="150"
     style="border:2px solid #ccc;border-radius:10px;">
</div>

<div class="col-12 mt-3">

<button type="submit" class="btn btn-success">
💾 Save Student
</button>

<button type="reset" class="btn btn-warning">
🔄 Reset
</button>

<a href="dashboard.html" class="btn btn-secondary">
⬅ Dashboard
</a>

</div>

</div>

</form>

</div>

</div>

</div>

<script src="js/app.js"></script>

</body>
</html>
